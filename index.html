<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDR Department — Collections Report 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --teal-dark: #085041; --teal-mid: #0F6E56; --teal-light: #1D9E75; --teal-pale: #E1F5EE;
    --blue-dark: #042C53; --blue-mid: #185FA5; --blue-pale: #E6F1FB;
    --amber-dark: #633806; --amber-mid: #BA7517; --amber-pale: #FAEEDA;
    --coral-dark: #4A1B0C; --coral-mid: #993C1D; --coral-pale: #FAECE7;
    --red-mid: #A32D2D; --red-pale: #FCEBEB;
    --gray-900: #2C2C2A; --gray-700: #5F5E5A; --gray-500: #888780; --gray-200: #D3D1C7; --gray-50: #F1EFE8;
    --bg: #F7F6F2; --surface: #FFFFFF; --border: rgba(136,135,128,0.2);
    --font: 'Georgia', 'Times New Roman', serif;
    --font-sans: 'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font-sans); color: var(--gray-900); font-size: 13px; }

  /* PRINT */
  @media print {
    .no-print { display: none !important; }
    body { background: white; }
    .page-wrap { max-width: 100%; padding: 10mm; }
    .chart-grid { grid-template-columns: 1fr 1fr; }
  }

  .page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

  /* HEADER */
  .report-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; border-bottom: 2px solid var(--teal-mid); margin-bottom: 20px; }
  .company-block { display: flex; flex-direction: column; gap: 2px; }
  .company-name { font-size: 20px; font-weight: 700; color: var(--teal-dark); letter-spacing: -0.3px; font-family: var(--font); }
  .report-title { font-size: 13px; color: var(--gray-700); text-transform: uppercase; letter-spacing: 0.08em; }
  .header-right { text-align: right; }
  .period-badge { display: inline-block; background: var(--teal-mid); color: white; font-size: 11px; font-weight: 600; padding: 4px 14px; border-radius: 20px; letter-spacing: 0.06em; margin-bottom: 6px; }
  .header-meta { font-size: 11px; color: var(--gray-500); }

  /* MONTH TABS */
  .month-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; flex-wrap: wrap; }
  .tab { padding: 7px 18px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; color: var(--gray-500); background: transparent; transition: all 0.15s; position: relative; bottom: -1px; }
  .tab:hover { color: var(--teal-mid); }
  .tab.active { background: var(--surface); border-color: var(--border); color: var(--teal-dark); font-weight: 600; }
  .tab.no-data { color: var(--gray-200); cursor: default; font-style: italic; }
  .tab.no-data:hover { color: var(--gray-200); }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.teal::before { background: var(--teal-mid); }
  .kpi-card.blue::before { background: var(--blue-mid); }
  .kpi-card.amber::before { background: var(--amber-mid); }
  .kpi-card.coral::before { background: var(--coral-mid); }
  .kpi-card.red::before { background: var(--red-mid); }
  .kpi-label { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: var(--gray-900); font-family: var(--font); line-height: 1; margin-bottom: 4px; }
  .kpi-sub { font-size: 10px; color: var(--gray-500); }

  /* SECTION HEADING */
  .section-head { font-size: 10px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-head::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

  /* CHART GRID */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--gray-900); margin-bottom: 12px; }
  .chart-title span { color: var(--gray-500); font-weight: 400; font-size: 11px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-500); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* TABLE */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--gray-50); }
  th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-500); padding: 9px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); }
  th:first-child { text-align: left; }
  td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--gray-900); text-align: right; }
  td:first-child { text-align: left; font-weight: 500; }
  tr:last-child td { border-bottom: none; background: var(--gray-50); font-weight: 700; }
  tr:hover:not(:last-child) td { background: #FAFAF8; }

  /* PILL */
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .pill-hi  { background: var(--teal-pale);  color: var(--teal-dark); }
  .pill-mid { background: var(--amber-pale); color: var(--amber-dark); }
  .pill-low { background: var(--red-pale);   color: var(--red-mid); }

  /* TREND TABLE */
  .trend-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }

  /* HORIZONTAL BAR */
  .hbar-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
  .hbar-name { width: 115px; font-size: 11px; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .hbar-track { flex: 1; background: var(--gray-50); border-radius: 4px; height: 16px; overflow: hidden; }
  .hbar-fill { height: 100%; border-radius: 4px; }
  .hbar-pct { width: 46px; font-size: 11px; font-weight: 600; text-align: right; flex-shrink: 0; }

  /* FOOTER */
  .report-footer { border-top: 1px solid var(--border); padding-top: 12px; display: flex; justify-content: space-between; font-size: 10px; color: var(--gray-500); margin-top: 8px; }

  /* NO DATA */
  .no-data-state { text-align: center; padding: 48px 20px; color: var(--gray-500); }
  .no-data-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
  .no-data-state p { font-size: 13px; }

  /* PRINT BUTTON */
  .action-bar { display: flex; gap: 8px; margin-bottom: 18px; justify-content: flex-end; }
  .btn { padding: 7px 16px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--gray-700); font-family: var(--font-sans); transition: all 0.15s; }
  .btn:hover { background: var(--gray-50); }
  .btn.primary { background: var(--teal-mid); color: white; border-color: var(--teal-mid); }
  .btn.primary:hover { background: var(--teal-dark); }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <div class="report-header">
    <div class="company-block">
      <div class="company-name">EDR</div>
      <div class="report-title"> · Collections Performance Report</div>
    </div>
    <div class="header-right">
      <div class="period-badge" id="activeBadge">MAY 2026</div>
      <div class="header-meta">Report generated: <span id="genDate"></span></div>
      <div class="header-meta"> All figures in TZS</div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar no-print">
    <button class="btn" onclick="window.print()">⎙ Print / Save PDF</button>
  </div>

  <!-- MONTH TABS -->
  <div class="month-tabs" id="monthTabs"></div>

  <!-- DYNAMIC CONTENT -->
  <div id="reportContent"></div>

  <!-- TREND SECTION (always shown) -->
  <div id="trendSection"></div>

  <!-- FOOTER -->
  <div class="report-footer">
    <span>Habari Telecom · EDR Department · Confidential</span>
    <span id="footerMonth"></span>
  </div>

</div>

<script>
// ============================================================
// DATA CONFIG — add Jan/Feb/Mar data here when available
// ============================================================
const MONTHS = {
  jan: { label: 'January', hasData: false },
  feb: { label: 'February', hasData: false },
  mar: { label: 'March', hasData: false },
  apr: {
    label: 'April', hasData: true,
    summary: {
      opening: 1121798473, invoices: 1226371027,
      collections: 968667068, closing: 1379502432,
      pct: 41.25, dso: 56.58
    },
    collectors: [
      { name:'Rosemary Vicent', open:178186556, inv:233964472, col:216736456, close:195414572, target:208126138, ach:104.14 },
      { name:'Agape Mnzava',    open:106032095, inv:182782441, col:177568285, close:111246251, target:171107842, ach:103.78 },
      { name:'Doreen Jackson',  open:135755269, inv:197410981, col:148815657, close:184350593, target:164831516, ach:90.28  },
      { name:'Fredy Edward',    open:103296320, inv:82390687,  col:91623064,  close:94063943,  target:101575792, ach:90.20  },
      { name:'Doreen Mehta',    open:92204261,  inv:324494509, col:142908702, close:273790068, target:214953860, ach:66.48  },
      { name:'Samwel Kivuyo',   open:85015132,  inv:73193280,  col:68497225,  close:89711187,  target:104896619, ach:65.30  },
      { name:'Winifreda',       open:82075206,  inv:70133520,  col:57878911,  close:94329815,  target:98743472,  ach:58.62  },
      { name:'Eldad Moyo',      open:110962921, inv:38329328,  col:36724152,  close:112568097, target:67780268,  ach:54.18  },
      { name:'Simon',           open:161047683, inv:23671809,  col:27914616,  close:156804876, target:87920086,  ach:31.75  },
    ]
  },
  may: {
    label: 'May', hasData: true,
    summary: {
      opening: 1390798474, invoices: 375306256,
      collections: 389633930, closing: 1376470800,
      pct: 22.06, dso: 59.39
    },
    collectors: [
      { name:'Doreen Mehta',    open:274574768, inv:63078821,  col:142951285, close:194702304, target:210458226, ach:67.92 },
      { name:'Rosemary Vicent', open:196594572, inv:57725851,  col:43510181,  close:210810242, target:115302429, ach:37.74 },
      { name:'Doreen Jackson',  open:184350593, inv:52163945,  col:53253324,  close:183261214, target:158184800, ach:33.67 },
      { name:'Samwel Kivuyo',   open:91852887,  inv:20846226,  col:22944071,  close:89755042,  target:68869699,  ach:33.32 },
      { name:'Agape Mnzava',    open:112030951, inv:98020831,  col:48954713,  close:161097069, target:147391882, ach:33.21 },
      { name:'Winifreda',       open:94959215,  inv:23775451,  col:24202166,  close:94532500,  target:76939129,  ach:31.46 },
      { name:'Eldad Moyo',      open:112920397, inv:13371230,  col:15700182,  close:110591445, target:51000943,  ach:30.78 },
      { name:'Fredy Edward',    open:94889943,  inv:28686441,  col:18075020,  close:105501364, target:62643813,  ach:28.85 },
      { name:'Simon',           open:157165554, inv:17637460,  col:20040278,  close:154762736, target:81724225,  ach:24.52 },
    ]
  }
};

const M = v => (v/1e6).toFixed(1);
const MB = v => (v/1e6).toFixed(0);
const fmtTZS = v => v.toLocaleString();
const fmtM = v => (v/1e6).toFixed(1)+'M';

let activeMonth = 'may';
let chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function pillClass(ach) {
  return ach >= 70 ? 'pill-hi' : ach >= 40 ? 'pill-mid' : 'pill-low';
}
function barColor(ach) {
  return ach >= 70 ? '#0F6E56' : ach >= 40 ? '#BA7517' : '#A32D2D';
}

function renderTabs() {
  const container = document.getElementById('monthTabs');
  const keys = ['jan','feb','mar','apr','may'];
  container.innerHTML = keys.map(k => {
    const m = MONTHS[k];
    const cls = !m.hasData ? 'no-data' : (k === activeMonth ? 'active' : '');
    const click = m.hasData ? `onclick="setMonth('${k}')"` : '';
    return `<div class="tab ${cls}" ${click}>${m.label}${!m.hasData ? ' *' : ''}</div>`;
  }).join('');
}

function setMonth(key) {
  activeMonth = key;
  renderTabs();
  renderReport();
  document.getElementById('activeBadge').textContent = MONTHS[key].label.toUpperCase() + ' 2026';
  document.getElementById('footerMonth').textContent = MONTHS[key].label + ' 2026 · Data source: Habari Billing System';
}

function renderReport() {
  const m = MONTHS[activeMonth];
  const el = document.getElementById('reportContent');

  if (!m.hasData) {
    el.innerHTML = `<div class="no-data-state"><div class="icon">📋</div><p>No data available for ${m.label}. Add data to the CONFIG block to populate this month.</p></div>`;
    return;
  }

  const s = m.summary;
  const netChange = s.collections - s.invoices;
  const colVsOpen = ((s.collections / s.opening)*100).toFixed(1);

  el.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card teal">
        <div class="kpi-label">Opening Balance</div>
        <div class="kpi-value">${fmtM(s.opening)}</div>
        <div class="kpi-sub">TZS outstanding</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Total Invoices</div>
        <div class="kpi-value">${fmtM(s.invoices)}</div>
        <div class="kpi-sub">billed this month</div>
      </div>
      <div class="kpi-card teal">
        <div class="kpi-label">Total Collections</div>
        <div class="kpi-value">${fmtM(s.collections)}</div>
        <div class="kpi-sub">${colVsOpen}% of opening AR</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Closing Balance</div>
        <div class="kpi-value">${fmtM(s.closing)}</div>
        <div class="kpi-sub">net ${netChange >= 0 ? '▲' : '▼'} ${fmtM(Math.abs(netChange))}</div>
      </div>
      <div class="kpi-card ${s.pct >= 50 ? 'teal' : s.pct >= 30 ? 'amber' : 'coral'}">
        <div class="kpi-label">% Collected vs AR</div>
        <div class="kpi-value">${s.pct}%</div>
        <div class="kpi-sub">DSO: ${s.dso} days</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="section-head">Invoice vs Collection · Per Collector</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Invoice vs Collection <span>(TZS Millions)</span></div>
        <div class="legend">
          <span class="leg-item"><span class="leg-dot" style="background:#185FA5"></span>Invoices</span>
          <span class="leg-item"><span class="leg-dot" style="background:#0F6E56"></span>Collections</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="invColChart" role="img" aria-label="Invoices vs collections per collector for ${m.label} 2026."></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Target Achievement <span>(%)</span></div>
        <div id="achBars"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="section-head">Collector Performance Detail</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Collector</th>
            <th>Opening (M)</th>
            <th>Invoices (M)</th>
            <th>Collections (M)</th>
            <th>Closing (M)</th>
            <th>Target (M)</th>
            <th>Achievement</th>
          </tr>
        </thead>
        <tbody id="collectorTable"></tbody>
      </table>
    </div>
  `;

  // Render collector rows
  const sorted = [...m.collectors].sort((a,b) => b.ach - a.ach);
  const tbody = document.getElementById('collectorTable');
  sorted.forEach(c => {
    tbody.innerHTML += `<tr>
      <td>${c.name}</td>
      <td>${MB(c.open)}</td>
      <td>${MB(c.inv)}</td>
      <td>${MB(c.col)}</td>
      <td>${MB(c.close)}</td>
      <td>${MB(c.target)}</td>
      <td><span class="pill ${pillClass(c.ach)}">${c.ach.toFixed(2)}%</span></td>
    </tr>`;
  });
  // Total row
  const tot = m.collectors.reduce((a,c) => ({
    open: a.open+c.open, inv: a.inv+c.inv, col: a.col+c.col,
    close: a.close+c.close, target: a.target+c.target
  }), {open:0,inv:0,col:0,close:0,target:0});
  const totAch = ((tot.col/tot.target)*100).toFixed(2);
  tbody.innerHTML += `<tr>
    <td>TOTAL</td>
    <td>${MB(tot.open)}</td>
    <td>${MB(tot.inv)}</td>
    <td>${MB(tot.col)}</td>
    <td>${MB(tot.close)}</td>
    <td>${MB(tot.target)}</td>
    <td><span class="pill ${pillClass(parseFloat(totAch))}">${totAch}%</span></td>
  </tr>`;

  // Bar chart
  destroyChart('invColChart');
  const labels = m.collectors.map(c => c.name.split(' ')[0]);
  chartInstances['invColChart'] = new Chart(document.getElementById('invColChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Invoices',    data: m.collectors.map(c=>parseFloat(M(c.inv))), backgroundColor:'#185FA5', borderRadius:3 },
        { label:'Collections', data: m.collectors.map(c=>parseFloat(M(c.col))), backgroundColor:'#0F6E56', borderRadius:3 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{size:10}, color:'#888780' }, grid:{ display:false } },
        y:{ ticks:{ font:{size:10}, color:'#888780', callback:v=>v+'M' }, grid:{ color:'rgba(136,135,128,0.12)' } }
      }
    }
  });

  // Horizontal achievement bars
  const achContainer = document.getElementById('achBars');
  const maxAch = Math.max(...m.collectors.map(c=>c.ach), 100);
  sorted.forEach(c => {
    const color = barColor(c.ach);
    const w = Math.min((c.ach/maxAch)*100, 100);
    achContainer.innerHTML += `<div class="hbar-row">
      <span class="hbar-name">${c.name.split(' ')[0]}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${color}"></div></div>
      <span class="hbar-pct" style="color:${color}">${c.ach.toFixed(1)}%</span>
    </div>`;
  });
}

function renderTrend() {
  const availableKeys = Object.keys(MONTHS).filter(k => MONTHS[k].hasData);
  const el = document.getElementById('trendSection');

  if (availableKeys.length < 2) {
    el.innerHTML = `<div class="section-head">Month-over-Month Trend</div>
      <div class="trend-card" style="text-align:center;padding:24px;color:var(--gray-500);font-size:12px;">
        Trend chart will appear once data for 2+ months is available. Add January–March data to the CONFIG to complete the picture.
      </div>`;
    return;
  }

  const labels = availableKeys.map(k => MONTHS[k].label.slice(0,3));
  const invData  = availableKeys.map(k => parseFloat(M(MONTHS[k].summary.invoices)));
  const colData  = availableKeys.map(k => parseFloat(M(MONTHS[k].summary.collections)));
  const pctData  = availableKeys.map(k => MONTHS[k].summary.pct);
  const dsoData  = availableKeys.map(k => MONTHS[k].summary.dso);
  const closeData = availableKeys.map(k => parseFloat(M(MONTHS[k].summary.closing)));

  // Collector month-over-month comparison
  const allCollectors = [...new Set(
    availableKeys.flatMap(k => MONTHS[k].collectors.map(c=>c.name))
  )].sort();

  el.innerHTML = `
    <div class="section-head">Month-over-Month Trend (${availableKeys.length} months available)</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Invoices vs Collections — Monthly Trend <span>(TZS Millions)</span></div>
        <div class="legend">
          <span class="leg-item"><span class="leg-dot" style="background:#185FA5"></span>Invoices</span>
          <span class="leg-item"><span class="leg-dot" style="background:#0F6E56"></span>Collections</span>
        </div>
        <div style="position:relative;height:220px"><canvas id="trendLineChart" role="img" aria-label="Month over month invoices and collections trend for 2026."></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">% Collected &amp; DSO Trend</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-dot" style="background:#BA7517"></span>% Collected</span>
          <span class="leg-item"><span class="leg-dot" style="background:#D4537E"></span>DSO (days)</span>
        </div>
        <div style="position:relative;height:220px"><canvas id="trendPctChart" role="img" aria-label="Percentage collected and days sales outstanding trend."></canvas></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">Closing AR Balance Trend <span>(TZS Millions)</span></div>
        <div style="position:relative;height:180px"><canvas id="trendCloseChart" role="img" aria-label="Closing accounts receivable balance trend across months."></canvas></div>
      </div>
    </div>

    <div class="section-head">Collector Achievement — Month-over-Month Comparison (%)</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Collector</th>
            ${availableKeys.map(k=>`<th>${MONTHS[k].label}</th>`).join('')}
            <th>Trend</th>
          </tr>
        </thead>
        <tbody id="trendTable"></tbody>
      </table>
    </div>

    <div class="section-head">Summary — Monthly Comparison</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Metric</th>
            ${availableKeys.map(k=>`<th>${MONTHS[k].label}</th>`).join('')}
            <th>Change (last 2)</th>
          </tr>
        </thead>
        <tbody id="summaryTable"></tbody>
      </table>
    </div>
  `;

  // Trend line chart
  destroyChart('trendLineChart');
  chartInstances['trendLineChart'] = new Chart(document.getElementById('trendLineChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Invoices',    data:invData,  backgroundColor:'rgba(24,95,165,0.75)', borderRadius:4 },
        { label:'Collections', data:colData,  backgroundColor:'rgba(15,110,86,0.75)', borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{size:11}, color:'#888780' }, grid:{ display:false } },
        y:{ ticks:{ font:{size:10}, color:'#888780', callback:v=>v+'M' }, grid:{ color:'rgba(136,135,128,0.1)' } }
      }
    }
  });

  destroyChart('trendPctChart');
  chartInstances['trendPctChart'] = new Chart(document.getElementById('trendPctChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'% Collected', data:pctData,  borderColor:'#BA7517', backgroundColor:'rgba(186,117,23,0.08)', tension:0.3, pointRadius:5, fill:true, yAxisID:'y' },
        { label:'DSO (days)',  data:dsoData,  borderColor:'#D4537E', backgroundColor:'rgba(212,83,126,0.08)', tension:0.3, pointRadius:5, fill:false, borderDash:[4,3], yAxisID:'y2' },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{size:11}, color:'#888780' }, grid:{ display:false } },
        y:{ position:'left', ticks:{ font:{size:10}, color:'#BA7517', callback:v=>v+'%' }, grid:{ color:'rgba(136,135,128,0.1)' } },
        y2:{ position:'right', ticks:{ font:{size:10}, color:'#D4537E', callback:v=>v+'d' }, grid:{ display:false } }
      }
    }
  });

  destroyChart('trendCloseChart');
  chartInstances['trendCloseChart'] = new Chart(document.getElementById('trendCloseChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label:'Closing Balance', data:closeData,
        borderColor:'#185FA5', backgroundColor:'rgba(24,95,165,0.07)',
        tension:0.3, pointRadius:6, fill:true, borderWidth:2
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{size:11}, color:'#888780' }, grid:{ display:false } },
        y:{ ticks:{ font:{size:10}, color:'#888780', callback:v=>v+'M' }, grid:{ color:'rgba(136,135,128,0.1)' } }
      }
    }
  });

  // Collector trend table
  const trendTbody = document.getElementById('trendTable');
  allCollectors.forEach(name => {
    const vals = availableKeys.map(k => {
      const c = MONTHS[k].collectors.find(x=>x.name===name);
      return c ? c.ach : null;
    });
    const defined = vals.filter(v=>v!==null);
    const last2 = defined.slice(-2);
    let trendArrow = '—';
    if (last2.length === 2) {
      const diff = last2[1] - last2[0];
      trendArrow = diff > 5 ? `<span style="color:var(--teal-mid)">▲ +${diff.toFixed(1)}%</span>`
                 : diff < -5 ? `<span style="color:var(--red-mid)">▼ ${diff.toFixed(1)}%</span>`
                 : `<span style="color:var(--gray-500)">→ ${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
    }
    const cells = vals.map(v => v === null ? '<td style="color:var(--gray-200)">—</td>'
      : `<td><span class="pill ${pillClass(v)}">${v.toFixed(1)}%</span></td>`).join('');
    trendTbody.innerHTML += `<tr><td>${name}</td>${cells}<td>${trendArrow}</td></tr>`;
  });

  // Summary table
  const metrics = [
    { label:'Opening Balance', key:'opening', fmt: v=>fmtM(v)+' TZS' },
    { label:'Total Invoices',  key:'invoices', fmt: v=>fmtM(v)+' TZS' },
    { label:'Total Collections',key:'collections', fmt: v=>fmtM(v)+' TZS' },
    { label:'Closing Balance', key:'closing', fmt: v=>fmtM(v)+' TZS' },
    { label:'% Collected',     key:'pct', fmt: v=>v+'%' },
    { label:'DSO (days)',      key:'dso', fmt: v=>v+' d' },
  ];
  const sumTbody = document.getElementById('summaryTable');
  metrics.forEach(({ label, key, fmt }) => {
    const vals = availableKeys.map(k => MONTHS[k].summary[key]);
    const last2 = vals.slice(-2);
    let change = '—';
    if (last2.length === 2 && last2[0] !== 0) {
      const diff = ((last2[1]-last2[0])/last2[0]*100).toFixed(1);
      const isPositive = (key === 'pct' || key === 'collections') ? parseFloat(diff) > 0 : parseFloat(diff) < 0;
      const color = isPositive ? 'var(--teal-mid)' : 'var(--red-mid)';
      change = `<span style="color:${color}">${parseFloat(diff)>0?'+':''}${diff}%</span>`;
    }
    const cells = vals.map(v=>`<td>${fmt(v)}</td>`).join('');
    sumTbody.innerHTML += `<tr><td>${label}</td>${cells}<td>${change}</td></tr>`;
  });
}

// INIT
document.getElementById('genDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
document.getElementById('footerMonth').textContent = 'May 2026 · Data source: BI (COLLECTION)';
renderTabs();
renderReport();
renderTrend();
</script>
</body>
</html>
